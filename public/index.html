<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kingdom Vision Films</title>
  <meta name="description" content="Kingdom Vision Films — Premium cinematic storytelling." />
  <meta property="og:title" content="Kingdom Vision Films" />
  <meta property="og:description" content="The Kingdom Is Building." />
  <meta property="og:image" content="./assets/kvf-logo-4k.png" />
  <meta name="theme-color" content="#000000" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@100;200;300;400&display=swap" rel="stylesheet" />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="intro-active">


<!-- ═══════════════════════════════════════════════════════════
     ① INTRO SCREEN  (z:9000 — covers everything)
     Video plays once. At 9.3 s → crossfade to #bg-video.
     Sound toggle lives here; preserves mute state on transition.
═══════════════════════════════════════════════════════════ -->
<div id="intro-screen" role="presentation" aria-hidden="true">

  <video
    id="intro-video"
    autoplay
    muted
    playsinline
    preload="auto"
    poster="./assets/kvf-intro-poster.jpg"
    disablePictureInPicture
    disableRemotePlayback
    aria-hidden="true"
  >
    <source src="./assets/kvf-intro.mp4" type="video/mp4" />
  </video>

  <!-- Cinematic vignette over intro video only -->
  <div id="intro-vignette"></div>

  <!-- Loading spinner — hidden once video is ready -->
  <div id="intro-loader" aria-hidden="true">
    <div class="loader-ring"></div>
    <div class="loader-ring"></div>
    <div class="loader-ring"></div>
  </div>

</div><!-- /intro-screen -->


<!-- ═══════════════════════════════════════════════════════════
     ② HOMEPAGE  (always rendered — underneath intro-screen)
     Layer stack (back → front):
       #base-bg            z:0    pure black base
       #bg-video-wrap      z:1    looping homepage video — fullscreen cover
       #grain-canvas       z:2    subtle film grain
       #logo-glow          z:3    warm amber radial glow on lion
       #cinematic-overlay  z:4    top + bottom gradient burns
       #vignette           z:5    edge darkening
       #particle-canvas    z:6    gold ember particles
       .smoke × 3          z:7    atmospheric haze
       #site-header        z:100  fixed navigation
       #hero-section       z:10   hero text — upper-centre
═══════════════════════════════════════════════════════════ -->
<div id="homepage">

  <!-- Layer 0: pure black base -->
  <div id="base-bg"></div>

  <!-- Layer 1: dual looping homepage videos — JS crossfades between them
       Video A plays first; B preloads. 1.5 s before A ends, B fades in
       while A fades out. Then they swap roles — seamless, no jump.    -->
  <div id="bg-video-wrap">
    <video
      id="bg-video-a"
      muted
      playsinline
      preload="auto"
      disablePictureInPicture
      disableRemotePlayback
      aria-hidden="true"
    >
      <source src="./assets/kvf-bg-loop.mp4" type="video/mp4" />
    </video>
    <video
      id="bg-video-b"
      muted
      playsinline
      preload="auto"
      disablePictureInPicture
      disableRemotePlayback
      aria-hidden="true"
    >
      <source src="./assets/kvf-bg-loop.mp4" type="video/mp4" />
    </video>
  </div>

  <!-- Layer 2: film grain overlay -->
  <canvas id="grain-canvas" aria-hidden="true"></canvas>

  <!-- Layer 3: warm amber glow -->
  <div id="logo-glow"></div>

  <!-- Layer 4: cinematic gradient overlay (dark top + bottom) -->
  <div id="cinematic-overlay"></div>

  <!-- Layer 5: edge vignette -->
  <div id="vignette"></div>

  <!-- Layer 6: gold ember particles -->
  <canvas id="particle-canvas" aria-hidden="true"></canvas>

  <!-- Layer 7: atmospheric smoke haze -->
  <div class="smoke" id="smoke-1"></div>
  <div class="smoke" id="smoke-2"></div>
  <div class="smoke" id="smoke-3"></div>

  <!-- Layer 8: Fixed navigation -->
  <header id="site-header" role="banner">
    <button id="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <nav id="main-nav" role="navigation" aria-label="Main navigation">
      <ul>
        <li><a href="#about">About</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#films">Films</a></li>
        <li><a href="#television">Television</a></li>
        <li><a href="#contact" class="nav-cta">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- Layer 9: Hero text — upper-centre, above everything -->
  <main id="hero-section" role="main" aria-label="Hero section">
    <div id="hero-headline-wrap">

      <h1 id="hero-headline" aria-label="The Kingdom Is Building">
        <span class="word">THE&nbsp;</span><span
            class="word">KINGDOM&nbsp;</span><span
            class="word">IS&nbsp;</span><span
            class="word">BUILDING</span>
      </h1>

    </div>

    <!-- Cinematic tagline — single line, pinned to bottom of hero -->
    <p id="hero-tagline">THE KINGDOM IS BUILDING — THANK YOU FOR YOUR PATIENCE</p>

    <div id="scroll-cue" aria-hidden="true">
      <div class="scroll-line"></div>
      <span>Scroll</span>
    </div>
  </main>

  <!-- Spacer so the fixed hero section has scroll room -->
  <div style="height:100vh" aria-hidden="true"></div>

  <!-- Scrollable anchor sections -->
  <section id="about"      class="anchor-section"></section>
  <section id="projects"   class="anchor-section"><span class="section-label">Projects</span></section>
  <section id="films"      class="anchor-section"><span class="section-label">Films</span></section>
  <section id="television" class="anchor-section"><span class="section-label">Television</span></section>
  <section id="contact"    class="anchor-section"><span class="section-label">Contact</span></section>

  <footer id="site-footer" role="contentinfo">
    <div class="footer-line"></div>
    <div class="footer-inner">
      <p class="footer-copy">&copy; 2026 Kingdom Vision Films. All rights reserved.</p>
    </div>
  </footer>

</div><!-- /homepage -->


<!-- ═══════════════════════════════════════════════════════════
     SOUND TOGGLE  (z:9200 — above intro-screen and homepage)
     Lives at body level so it survives intro-screen removal.
     Visible during intro AND homepage. JS controls .visible.
═══════════════════════════════════════════════════════════ -->
<button
  id="sound-toggle"
  aria-label="Sound Off — click to enable audio"
  title="Sound Off"
>
  <span class="sound-icon-wrap" aria-hidden="true">
    <svg class="sound-svg" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">

      <!-- MUTED: speaker + diagonal slash -->
      <g class="icon-muted">
        <path d="M8 13.5H12.5L19 8V28L12.5 22.5H8V13.5Z"
              stroke="currentColor" stroke-width="1.4"
              stroke-linejoin="round" fill="none"/>
        <line x1="24" y1="11" x2="30" y2="25"
              stroke="currentColor" stroke-width="1.4"
              stroke-linecap="round"/>
      </g>

      <!-- UNMUTED: speaker + two arcs -->
      <g class="icon-unmuted" style="display:none">
        <path d="M8 13.5H12.5L19 8V28L12.5 22.5H8V13.5Z"
              stroke="currentColor" stroke-width="1.4"
              stroke-linejoin="round" fill="none"/>
        <path d="M23 14.5C24.5 16 24.5 20 23 21.5"
              stroke="currentColor" stroke-width="1.4"
              stroke-linecap="round" fill="none"/>
        <path d="M26 11.5C29 14 29 22 26 24.5"
              stroke="currentColor" stroke-width="1.4"
              stroke-linecap="round" fill="none"/>
      </g>

    </svg>
  </span>
  <span class="sound-label">Sound</span>
</button>


<!-- Cinematic engine — loaded last so DOM is ready -->
<script src="script.js"></script>

</body>
</html>
